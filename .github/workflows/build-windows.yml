name: Build XMRig Windows (0% Fee)

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-2022
    
    steps:
    - name: Checkout XMRig source code
      uses: actions/checkout@v4
      with:
        repository: xmrig/xmrig
        path: xmrig-src

    # 1. 自动从源码提取官方版本号
    - name: Get XMRig Version
      shell: pwsh
      run: |
        $versionFile = "xmrig-src/src/version.h"
        $match = Select-String -Path $versionFile -Pattern 'APP_VERSION\s+"([^"]+)"' | Select-Object -First 1
        $version = $match.Matches.Groups[1].Value
        
        if (-not $version) {
            Write-Error "Failed to extract version from $versionFile"
            exit 1
        }
        Write-Host "Extracted XMRig Version: $version"
        # 将版本号写入环境变量，供后续步骤使用
        echo "VERSION=$version" >> $env:GITHUB_ENV

    # 2. 使用整行替换，确保 100% 修改成功
    - name: Modify donate level to 0%
      shell: pwsh
      run: |
        $donateFile = "xmrig-src/src/donate.h"
        Write-Host "Modifying donate level to 0% in $donateFile"
        
        # 使用 .* 匹配整行，无论原代码格式如何，都强制替换为 0
        (Get-Content $donateFile) -replace '.*kDefaultDonateLevel.*', 'constexpr const int kDefaultDonateLevel = 0;' | Set-Content $donateFile
        (Get-Content $donateFile) -replace '.*kMinimumDonateLevel.*', 'constexpr const int kMinimumDonateLevel = 0;' | Set-Content $donateFile
        
        Write-Host "=== Modified donate.h ==="
        Get-Content $donateFile | Select-String "DonateLevel"

    - name: Download xmrig-deps (prebuilt dependencies)
      shell: pwsh
      run: |
        Write-Host "Cloning xmrig-deps repository..."
        git clone https://github.com/xmrig/xmrig-deps.git c:\xmrig-deps
        
        Write-Host "Directory structure:"
        Get-ChildItem -Path "c:\xmrig-deps" -Depth 1

    - name: Configure CMake
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Path "xmrig-src/build" -Force
        cd xmrig-src/build
        cmake .. -G "Visual Studio 17 2022" -A x64 -DXMRIG_DEPS="c:\xmrig-deps\msvc2022\x64"

    - name: Build Release
      shell: pwsh
      run: |
        cd xmrig-src/build
        cmake --build . --config Release

    # 3. 将编译好的文件重命名为带版本号的名称
    - name: Rename executable with version
      shell: pwsh
      run: |
        Copy-Item "xmrig-src/build/Release/xmrig.exe" "xmrig-${{ env.VERSION }}.exe"
        Write-Host "Renamed to xmrig-${{ env.VERSION }}.exe"

    # 4. 上传 artifact，压缩包名和内部文件名都包含版本号
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: xmrig-${{ env.VERSION }}-windows-x64-0fee
        path: xmrig-${{ env.VERSION }}.exe
        retention-days: 30

    - name: Create Release (on tag)
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: xmrig-${{ env.VERSION }}.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
